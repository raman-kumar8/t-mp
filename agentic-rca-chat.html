<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgentOps — RCA Console</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0a0b0e;
  --surface: #111318;
  --surface2: #181c24;
  --surface3: #1e2430;
  --border: #252d3d;
  --border2: #2d3848;
  --green: #3de88a;
  --green-dim: rgba(61,232,138,0.12);
  --blue: #4d9fff;
  --blue-dim: rgba(77,159,255,0.12);
  --amber: #f5b945;
  --amber-dim: rgba(245,185,69,0.12);
  --red: #ff5f57;
  --red-dim: rgba(255,95,87,0.1);
  --purple: #b97cff;
  --text: #dde4f0;
  --text-muted: #6b7a94;
  --text-dim: #3a4358;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Subtle grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(77,159,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,159,255,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

/* ── TOP BAR ── */
.topbar {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,11,14,0.95);
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  width: 28px; height: 28px;
  background: var(--blue);
  border-radius: 7px;
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: #000;
}

.app-name {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
}

.app-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.divider-v {
  width: 1px;
  height: 20px;
  background: var(--border);
}

.session-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.stage-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  border: 1px solid transparent;
  transition: all 0.3s;
}

.stage-pill.idle { border-color: var(--border); color: var(--text-muted); }
.stage-pill.rca { border-color: rgba(77,159,255,0.4); color: var(--blue); background: var(--blue-dim); }
.stage-pill.adj { border-color: rgba(245,185,69,0.4); color: var(--amber); background: var(--amber-dim); }
.stage-pill.done { border-color: rgba(61,232,138,0.4); color: var(--green); background: var(--green-dim); }

.dot-pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  animation: dotPulse 1.2s ease-in-out infinite;
}

@keyframes dotPulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.3; transform:scale(0.6); } }

/* ── FEED ── */
.feed {
  position: relative;
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 0;
  scroll-behavior: smooth;
}

.feed::-webkit-scrollbar { width: 4px; }
.feed::-webkit-scrollbar-track { background: transparent; }
.feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.feed-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ── EMPTY STATE ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  gap: 16px;
  opacity: 0.5;
}

.empty-icon {
  font-size: 40px;
  filter: grayscale(1);
}

.empty-text {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.5;
}

.empty-hint {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
}

/* ── USER MESSAGE ── */
.msg-user {
  display: flex;
  justify-content: flex-end;
  animation: msgIn 0.25s ease forwards;
  opacity: 0;
}

.msg-user-bubble {
  max-width: 70%;
  background: var(--blue-dim);
  border: 1px solid rgba(77,159,255,0.2);
  border-radius: 14px 14px 4px 14px;
  padding: 10px 16px;
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── AGENT BLOCK ── */
.agent-block {
  display: flex;
  flex-direction: column;
  gap: 4px;
  animation: msgIn 0.3s ease forwards;
  opacity: 0;
}

.agent-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 2px;
}

.agent-label-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

/* ── LOG LINE ── */
.log-line {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  padding: 3px 2px;
  line-height: 1.5;
  animation: logFade 0.2s ease forwards;
  opacity: 0;
}

.log-line .ts { color: var(--text-dim); margin-right: 8px; }
.log-line .tag-info { color: var(--blue); }
.log-line .tag-warn { color: var(--amber); }
.log-line .tag-ok { color: var(--green); }
.log-line .tag-err { color: var(--red); }
.log-line .hl { color: var(--text); }

@keyframes logFade { from { opacity: 0; } to { opacity: 1; } }

/* ── TOOL CALL CARD ── */
.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  animation: msgIn 0.25s ease forwards;
  opacity: 0;
  margin: 3px 0;
}

.tool-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
}

.tool-icon {
  font-size: 13px;
  width: 22px;
  text-align: center;
}

.tool-fn {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  flex: 1;
  color: var(--text);
}

.tool-fn span { color: var(--blue); }

.tool-status-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.tool-status-badge.running { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,185,69,0.3); }
.tool-status-badge.done { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,232,138,0.3); }
.tool-status-badge.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,95,87,0.25); }

.tool-body {
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  background: rgba(0,0,0,0.2);
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.7;
}

.tool-row { display: flex; gap: 10px; }
.tool-key { color: var(--text-muted); flex-shrink: 0; }
.tool-val-str { color: var(--amber); }
.tool-val-num { color: var(--purple); }
.tool-val-arr { color: var(--green); }
.tool-result { color: var(--green); margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border); }

/* ── RCA FINDINGS ── */
.findings-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  animation: msgIn 0.3s ease forwards;
  opacity: 0;
  margin: 3px 0;
}

.findings-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
}

.finding-item {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(37,45,61,0.6);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: logFade 0.3s ease forwards;
  opacity: 0;
}

.finding-item:last-child { border-bottom: none; }

.finding-accent {
  width: 3px;
  border-radius: 2px;
  flex-shrink: 0;
  align-self: stretch;
  min-height: 14px;
  margin-top: 2px;
}

.finding-accent.critical { background: var(--red); }
.finding-accent.warning { background: var(--amber); }
.finding-accent.info { background: var(--blue); }

.finding-content {}
.finding-tag {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.finding-tag.critical { color: var(--red); }
.finding-tag.warning { color: var(--amber); }
.finding-tag.info { color: var(--blue); }
.finding-text { font-size: 13px; color: var(--text); line-height: 1.5; }

/* ── TRIGGER BANNER ── */
.trigger-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--amber-dim);
  border: 1px solid rgba(245,185,69,0.25);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--amber);
  animation: msgIn 0.3s ease forwards;
  opacity: 0;
  margin: 6px 0;
}

.trigger-banner.complete { background: var(--green-dim); border-color: rgba(61,232,138,0.25); color: var(--green); }
.trigger-banner-icon { font-size: 16px; }
.trigger-banner-text { flex: 1; }
.trigger-banner-sub { font-size: 11px; font-weight: 400; opacity: 0.7; margin-top: 1px; font-family: var(--mono); }

/* Spinner */
.spin {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(245,185,69,0.2);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spinAnim 0.7s linear infinite;
  flex-shrink: 0;
}
.spin.green { border-color: rgba(61,232,138,0.2); border-top-color: var(--green); }
@keyframes spinAnim { to { transform: rotate(360deg); } }

/* ── ADJUSTMENT TABLE BLOCK ── */
.adj-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  animation: msgIn 0.35s ease forwards;
  opacity: 0;
  margin: 6px 0;
}

.adj-block-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.adj-block-title {
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.adj-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--amber-dim);
  color: var(--amber);
  border: 1px solid rgba(245,185,69,0.25);
  font-weight: 600;
}

.adj-count-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* Table */
.table-scroll { overflow-x: auto; }
.table-scroll::-webkit-scrollbar { height: 3px; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); }

table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 8px 14px;
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid rgba(37,45,61,0.5);
  transition: background 0.15s;
  animation: logFade 0.25s ease forwards;
  opacity: 0;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(77,159,255,0.03); }
tbody tr.row-edited { background: rgba(245,185,69,0.04); }
tbody tr.row-approved { background: rgba(61,232,138,0.04); }

td {
  padding: 9px 14px;
  font-size: 13px;
  white-space: nowrap;
  vertical-align: middle;
}

td.muted { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
td.rec { font-family: var(--mono); font-size: 11px; color: var(--green); font-weight: 600; }
td.curr { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(255,95,87,0.5); }

.sev-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.sev-badge.high { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,95,87,0.2); }
.sev-badge.medium { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,185,69,0.2); }
.sev-badge.low { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,232,138,0.15); }

.btn-adjust-row {
  background: var(--amber-dim);
  color: var(--amber);
  border: 1px solid rgba(245,185,69,0.3);
  border-radius: 6px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-adjust-row:hover { background: rgba(245,185,69,0.2); transform: translateY(-1px); }

.tag-adjusted {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(61,232,138,0.2);
  border-radius: 6px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
}

/* ── APPROVE STRIP ── */
.approve-strip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.approve-info {
  font-size: 13px;
  color: var(--text-muted);
}
.approve-info strong { color: var(--text); }

.btn-approve {
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 9px 24px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
}
.btn-approve:hover { background: #6fffa0; box-shadow: 0 0 18px rgba(61,232,138,0.35); transform: translateY(-1px); }

/* ── SUCCESS CARD ── */
.success-card {
  background: var(--surface);
  border: 1px solid rgba(61,232,138,0.25);
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  animation: msgIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
  opacity: 0;
  margin: 6px 0;
}

.success-emoji { font-size: 40px; margin-bottom: 12px; }
.success-title { font-size: 18px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
.success-sub { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

/* ── INPUT AREA ── */
.input-area {
  position: relative;
  z-index: 10;
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  background: rgba(10,11,14,0.97);
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}

.input-inner {
  max-width: 860px;
  margin: 0 auto;
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
}

.input-wrap {
  flex: 1;
  position: relative;
}

.input-field {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 12px 52px 12px 16px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
  line-height: 1.4;
  min-height: 46px;
  max-height: 120px;
  overflow-y: auto;
}

.input-field::placeholder { color: var(--text-dim); }
.input-field:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(77,159,255,0.1); }
.input-field:disabled { opacity: 0.4; cursor: not-allowed; }

.send-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px; height: 32px;
  background: var(--blue);
  border: none;
  border-radius: 8px;
  color: #000;
  font-size: 14px;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: all 0.15s;
}
.send-btn:hover { background: #6fb5ff; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; background: var(--border); }

.input-hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.3px;
}

/* ── EDIT MODAL ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,11,14,0.85);
  z-index: 100;
  place-items: center;
}
.modal-bg.open { display: grid; animation: fadeBlur 0.2s ease; }
@keyframes fadeBlur { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 26px;
  width: 460px;
  animation: popIn 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.modal-hd {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--amber);
}

.modal-f { margin-bottom: 14px; }
.modal-lbl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.modal-inp {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.modal-inp:focus { border-color: var(--blue); }

.modal-sel {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
  appearance: none;
  cursor: pointer;
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 22px;
}

.btn-cancel-m {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel-m:hover { border-color: var(--text-muted); color: var(--text); }

.btn-save-m {
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-save-m:hover { background: #ffd06a; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">AO</div>
    <div>
      <div class="app-name">AgentOps</div>
    </div>
    <div class="divider-v"></div>
    <div class="session-info" id="session-info">No active session</div>
  </div>
  <div class="topbar-right">
    <div class="stage-pill idle" id="stage-pill">
      <div class="dot-pulse"></div>
      <span id="stage-text">Idle</span>
    </div>
  </div>
</div>

<!-- FEED -->
<div class="feed" id="feed">
  <div class="feed-inner" id="feed-inner">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🧠</div>
      <div class="empty-text">Ask the RCA Agent to investigate an issue</div>
      <div class="empty-hint">e.g. "Find the RCA for PnL anomaly on 2025-01-15"</div>
    </div>
  </div>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <div class="input-inner">
    <div class="input-wrap">
      <textarea
        class="input-field"
        id="chat-input"
        placeholder="e.g. Find RCA for PnL anomaly on 2025-01-15…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="handleSend()">➤</button>
    </div>
  </div>
  <div class="input-hint" id="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-hd">⚡ Edit Adjustment — <span id="modal-comp-name"></span></div>
    <div class="modal-f">
      <div class="modal-lbl">Root Cause / Rationale</div>
      <input class="modal-inp" id="m-cause" type="text" />
    </div>
    <div class="modal-f">
      <div class="modal-lbl">Override Recommended Value</div>
      <input class="modal-inp" id="m-value" type="text" />
    </div>
    <div class="modal-f">
      <div class="modal-lbl">Severity</div>
      <select class="modal-sel" id="m-sev">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-save-m" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let processing = false;
let editingId = null;
let editedCount = 0;
let adjData = [];

// ── HELPERS ──
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function setInputEnabled(en) {
  const inp = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  inp.disabled = !en;
  btn.disabled = !en;
  document.getElementById('input-hint').textContent = en
    ? 'Press Enter to send · Shift+Enter for new line'
    : '⏳ Agent is processing…';
}

function setStage(stage, text) {
  const pill = document.getElementById('stage-pill');
  pill.className = `stage-pill ${stage}`;
  document.getElementById('stage-text').textContent = text;
}

function scrollFeed() {
  const feed = document.getElementById('feed');
  feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
}

function append(el) {
  const inner = document.getElementById('feed-inner');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  inner.appendChild(el);
  setTimeout(scrollFeed, 50);
  return el;
}

function makeEl(html, cls = 'div') {
  const el = document.createElement(cls);
  el.innerHTML = html;
  return el;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── INPUT ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function handleSend() {
  const inp = document.getElementById('chat-input');
  const val = inp.value.trim();
  if (!val || processing) return;
  inp.value = '';
  inp.style.height = 'auto';
  runPipeline(val);
}

// ── MAIN PIPELINE ──
async function runPipeline(query) {
  processing = true;
  editedCount = 0;
  setInputEnabled(false);
  setStage('rca', 'RCA Agent');
  document.getElementById('session-info').textContent = new Date().toLocaleTimeString();

  // User message
  const userMsg = document.createElement('div');
  userMsg.className = 'msg-user';
  userMsg.innerHTML = `<div class="msg-user-bubble">${escHtml(query)}</div>`;
  append(userMsg);

  await delay(300);

  // RCA Agent label
  const rcaLabel = makeEl(`
    <div class="agent-label">
      <div class="agent-label-dot" style="background:var(--blue)"></div>
      RCA Agent
    </div>
  `);
  append(rcaLabel);

  await delay(200);

  // Logs before first tool
  const logs1 = [
    { ts: ts(), tag: 'INFO', tagClass: 'tag-info', text: `Received query: <span class="hl">"${escHtml(query)}"</span>` },
    { ts: ts(), tag: 'INFO', tagClass: 'tag-info', text: 'Parsing date context and entity extraction…' },
    { ts: ts(), tag: 'OK',   tagClass: 'tag-ok',   text: 'Date resolved → <span class="hl">2025-01-15 (T+0)</span>' },
  ];
  for (const l of logs1) { await addLog(l); await delay(160); }

  // Tool calls
  const tools = [
    {
      icon: '📂', name: 'fetch_pnl_data',
      args: { date: { type: 'str', val: '"2025-01-15"' }, books: { type: 'arr', val: '["RATES", "CREDIT", "FX"]' } },
      delay_ms: 900,
      result: 'Loaded 18,432 positions across 3 books'
    },
    {
      icon: '🔍', name: 'detect_anomalies',
      args: { threshold_sd: { type: 'num', val: '3.2' }, method: { type: 'str', val: '"z_score + IQR"' } },
      delay_ms: 1100,
      result: '4 anomaly clusters detected'
    },
    {
      icon: '🕸', name: 'trace_attribution',
      args: { granularity: { type: 'str', val: '"desk"' }, depth: { type: 'num', val: '4' } },
      delay_ms: 1300,
      result: 'Attribution tree: 9 desks, 3 risk factors'
    },
    {
      icon: '📈', name: 'correlate_risk_factors',
      args: { factors: { type: 'arr', val: '["delta", "vega", "fx_spot"]' }, window: { type: 'str', val: '"5d"' } },
      delay_ms: 900,
      result: 'FX delta correlation: r=0.87 (p<0.001)'
    },
    {
      icon: '🧠', name: 'generate_rca_report',
      args: { model: { type: 'str', val: '"claude-3-5"' }, confidence_min: { type: 'num', val: '0.85' } },
      delay_ms: 1500,
      result: 'RCA report ready — 3 findings, confidence 0.92'
    },
  ];

  for (const tool of tools) {
    const tcard = addToolCard(tool);
    await delay(tool.delay_ms);
    finishTool(tcard, tool.result);
    // interleaved logs
    if (tool.name === 'detect_anomalies') {
      await delay(120);
      await addLog({ ts: ts(), tag: 'WARN', tagClass: 'tag-warn', text: 'Outlier detected in <span class="hl">RATES desk</span> — Δ PnL > 4.1σ from 30d mean' });
    }
    if (tool.name === 'trace_attribution') {
      await delay(120);
      await addLog({ ts: ts(), tag: 'INFO', tagClass: 'tag-info', text: 'FX-Rates desk shows highest unexplained residual: <span class="hl">-$2.3M</span>' });
    }
  }

  await delay(300);

  // RCA Findings
  const findings = [
    { type: 'critical', tag: 'Root Cause', text: 'Unhedged USD/JPY delta on FX-Rates desk. Overnight spot move of +1.8% generated unplanned loss of $2.3M vs EOD hedge strip.' },
    { type: 'warning', tag: 'Contributing Factor', text: 'CREDIT book had stale marks on 3 HY positions (>2 days), masking $0.9M accrual offset that was not reflected in daily PnL.' },
    { type: 'info', tag: 'Correlated Signal', text: 'Rates desk vol-of-vol positioning correlates at r=0.87 with FX spot move — risk factor overlap not captured in current VaR model.' },
  ];
  await showFindings(findings);

  await delay(600);

  // Auto-trigger adjustment agent
  const trigBanner = makeEl(`
    <div class="trigger-banner">
      <div class="trigger-banner-icon">⚡</div>
      <div class="trigger-banner-text">
        RCA complete — Adjustment Agent auto-triggered
        <div class="trigger-banner-sub">Collecting adjustment recommendations for 3 findings…</div>
      </div>
      <div class="spin"></div>
    </div>
  `);
  append(trigBanner.firstElementChild);
  setStage('adj', 'Adj Agent');
  await delay(2000);

  // Adjustment agent label
  const adjLabel = makeEl(`
    <div class="agent-label">
      <div class="agent-label-dot" style="background:var(--amber)"></div>
      Adjustment Agent
    </div>
  `);
  append(adjLabel);

  await delay(200);

  // Adj agent logs
  const adjLogs = [
    { ts: ts(), tag: 'INFO', tagClass: 'tag-info', text: 'Received 3 RCA findings from upstream agent' },
    { ts: ts(), tag: 'INFO', tagClass: 'tag-info', text: 'Querying position system for current values…' },
    { ts: ts(), tag: 'OK',   tagClass: 'tag-ok',   text: 'Adjustment matrix generated — 5 line items' },
  ];
  for (const l of adjLogs) { await addLog(l); await delay(180); }

  // Build adjustment data
  adjData = [
    { id: 1, book: 'FX-Rates', item: 'USD/JPY Delta', cause: 'Unhedged overnight spot move (+1.8%)', current: '-$2,340,000', recommended: '+$2,340,000', sev: 'high', adjusted: false },
    { id: 2, book: 'FX-Rates', item: 'Hedge Strip EOD', cause: 'Missing hedge strip PnL vs actual', current: '$0', recommended: '-$120,000', sev: 'medium', adjusted: false },
    { id: 3, book: 'CREDIT',   item: 'HY Position Mark', cause: 'Stale marks (>2d) on 3 HY positions', current: '-$900,000', recommended: '+$900,000', sev: 'high', adjusted: false },
    { id: 4, book: 'CREDIT',   item: 'Accrual Offset', cause: 'Accrual not reflected in daily PnL', current: '$0', recommended: '+$43,500', sev: 'medium', adjusted: false },
    { id: 5, book: 'RATES',    item: 'VaR Model Factor', cause: 'FX/Rates vol-vol overlap not in VaR', current: 'Not captured', recommended: 'Flag for model review', sev: 'low', adjusted: false },
  ];

  await delay(400);
  showAdjTable();
}

async function addLog(l) {
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = `<span class="ts">${l.ts}</span><span class="${l.tagClass}">[${l.tag}]</span> ${l.text}`;
  append(div);
  await delay(20);
}

function addToolCard(tool) {
  const argsHtml = Object.entries(tool.args).map(([k, v]) => {
    const valClass = v.type === 'str' ? 'tool-val-str' : v.type === 'num' ? 'tool-val-num' : 'tool-val-arr';
    return `<div class="tool-row"><span class="tool-key">${k}:</span><span class="${valClass}">${v.val}</span></div>`;
  }).join('');

  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="tool-card">
      <div class="tool-card-head">
        <span class="tool-icon">${tool.icon}</span>
        <span class="tool-fn"><span>${tool.name}</span>()</span>
        <span class="tool-status-badge running"><span class="spin"></span> running</span>
      </div>
      <div class="tool-body">${argsHtml}</div>
    </div>
  `;
  const card = wrap.firstElementChild;
  append(card);
  return card;
}

function finishTool(card, result) {
  const badge = card.querySelector('.tool-status-badge');
  badge.className = 'tool-status-badge done';
  badge.innerHTML = `✓ ${result}`;
  const body = card.querySelector('.tool-body');
  const resDiv = document.createElement('div');
  resDiv.className = 'tool-result';
  resDiv.textContent = '→ ' + result;
  body.appendChild(resDiv);
}

async function showFindings(findings) {
  const block = document.createElement('div');
  block.className = 'findings-block';
  block.innerHTML = `
    <div class="findings-head">
      <span>📊</span> RCA Findings
      <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-muted);">${findings.length} findings · confidence 0.92</span>
    </div>
  `;
  append(block);

  for (let i = 0; i < findings.length; i++) {
    await delay(350);
    const f = findings[i];
    const item = document.createElement('div');
    item.className = 'finding-item';
    item.style.animationDelay = '0s';
    item.innerHTML = `
      <div class="finding-accent ${f.type}"></div>
      <div class="finding-content">
        <div class="finding-tag ${f.type}">${f.tag}</div>
        <div class="finding-text">${f.text}</div>
      </div>
    `;
    block.appendChild(item);
    scrollFeed();
  }
}

function showAdjTable() {
  const block = document.createElement('div');
  block.className = 'adj-block';
  block.id = 'adj-block';
  block.innerHTML = `
    <div class="adj-block-head">
      <div class="adj-block-title">
        <span>⚡</span> Adjustment Recommendations
        <span class="adj-badge">ADJ-AGENT</span>
      </div>
      <span class="adj-count-badge" id="adj-count-badge">${adjData.length} items · 0 edited</span>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Book</th>
            <th>Item</th>
            <th>Root Cause</th>
            <th>Current</th>
            <th>Recommended</th>
            <th>Severity</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="adj-tbody"></tbody>
      </table>
    </div>
    <div class="approve-strip" id="approve-strip">
      <div class="approve-info">
        <strong id="approve-count">${adjData.length} adjustments</strong> ready for commitment
        <span id="edited-info" style="margin-left:8px;font-size:12px;"></span>
      </div>
      <button class="btn-approve" onclick="approveAll()">✓ Approve All &amp; Commit</button>
    </div>
  `;
  append(block);

  const tbody = document.getElementById('adj-tbody');
  adjData.forEach((row, i) => {
    const tr = buildRow(row, i);
    tbody.appendChild(tr);
  });

  setStage('done', 'Awaiting Approval');
  processing = false;
  setInputEnabled(true);
}

function buildRow(row, idx) {
  const tr = document.createElement('tr');
  tr.id = `tr-${row.id}`;
  if (row.adjusted) tr.className = 'row-edited';
  tr.style.animationDelay = `${idx * 0.07}s`;
  tr.innerHTML = `
    <td class="muted">${String(row.id).padStart(2,'0')}</td>
    <td style="font-weight:600">${row.book}</td>
    <td>${row.item}</td>
    <td style="font-size:12px;color:var(--text-muted);max-width:220px;white-space:normal;" id="cause-${row.id}">${row.cause}</td>
    <td class="curr">${row.current}</td>
    <td class="rec" id="rec-${row.id}">${row.recommended}</td>
    <td id="sev-${row.id}"><span class="sev-badge ${row.sev}">${row.sev.toUpperCase()}</span></td>
    <td id="act-${row.id}">${row.adjusted
      ? '<span class="tag-adjusted">✓ Edited</span>'
      : `<button class="btn-adjust-row" onclick="openModal(${row.id})">✏ Adjust</button>`
    }</td>
  `;
  return tr;
}

function updateCountBadge() {
  const badge = document.getElementById('adj-count-badge');
  if (badge) badge.textContent = `${adjData.length} items · ${editedCount} edited`;
  const info = document.getElementById('edited-info');
  if (info) info.textContent = editedCount > 0 ? `(${editedCount} manual override${editedCount > 1 ? 's' : ''})` : '';
}

function approveAll() {
  const tbody = document.getElementById('adj-tbody');
  tbody.querySelectorAll('tr').forEach(tr => tr.className = 'row-approved');
  document.getElementById('adj-block').querySelector('.approve-strip').remove();

  const card = document.createElement('div');
  card.className = 'success-card';
  card.innerHTML = `
    <div class="success-emoji">✅</div>
    <div class="success-title">All Adjustments Committed</div>
    <div class="success-sub">${adjData.length} line items approved · ${editedCount} manual override${editedCount !== 1 ? 's' : ''} applied · ${new Date().toLocaleTimeString()}</div>
  `;
  append(card);
  setStage('idle', 'Complete');

  processing = false;
  setInputEnabled(true);
}

// ── MODAL ──
function openModal(id) {
  const row = adjData.find(r => r.id === id);
  editingId = id;
  document.getElementById('modal-comp-name').textContent = row.item;
  document.getElementById('m-cause').value = row.cause;
  document.getElementById('m-value').value = row.recommended;
  document.getElementById('m-sev').value = row.sev;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  editingId = null;
}

function saveModal() {
  if (!editingId) return;
  const row = adjData.find(r => r.id === editingId);
  row.cause = document.getElementById('m-cause').value;
  row.recommended = document.getElementById('m-value').value;
  row.sev = document.getElementById('m-sev').value;
  const wasEdited = row.adjusted;
  row.adjusted = true;

  document.getElementById(`cause-${editingId}`).textContent = row.cause;
  document.getElementById(`rec-${editingId}`).textContent = row.recommended;
  document.getElementById(`sev-${editingId}`).innerHTML = `<span class="sev-badge ${row.sev}">${row.sev.toUpperCase()}</span>`;
  document.getElementById(`act-${editingId}`).innerHTML = '<span class="tag-adjusted">✓ Edited</span>';
  document.getElementById(`tr-${editingId}`).className = 'row-edited';

  if (!wasEdited) editedCount++;
  updateCountBadge();
  closeModal();
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function ts() {
  return new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
